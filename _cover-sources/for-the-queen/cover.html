<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For the Queen — A Design Appreciation</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root{
    --ftq-ink:#1c1712;
    --ftq-cream:#f6efe2;
    --ftq-gold:#c9a24a;
    --ftq-gold-soft:#d8bd7e;
    --ftq-bg:#140f0d;
    --ftq-bg-2:#2a1d17;
  }

  *{ box-sizing:border-box; }

  /* Isolate the cover so it doesn't inherit blog styles */
  .ftq-cover, .ftq-cover *{ margin:0; padding:0; }

  .ftq-cover{
    position:relative;
    width:100%;
    min-height:460px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:
      radial-gradient(120% 140% at 78% 20%, rgba(201,162,74,0.20) 0%, rgba(20,15,13,0) 55%),
      linear-gradient(150deg, var(--ftq-bg-2) 0%, var(--ftq-bg) 60%);
    font-family:'Cormorant Garamond','Playfair Display',Georgia,serif;
    color:var(--ftq-cream);
    isolation:isolate;
  }

  /* Blurred atmospheric wash of the box art behind everything */
  .ftq-cover__ambient{
    position:absolute;
    inset:-8%;
    background-image:url('for-the-queen-box.png');
    background-size:cover;
    background-position:center 30%;
    filter:blur(38px) saturate(1.15) brightness(0.72);
    transform:scale(1.15);
    opacity:0.55;
    z-index:0;
  }
  .ftq-cover__scrim{
    position:absolute;
    inset:0;
    background:linear-gradient(105deg, rgba(15,11,9,0.92) 0%, rgba(15,11,9,0.72) 42%, rgba(15,11,9,0.30) 100%);
    z-index:1;
  }
  /* Thin gold rule framing the whole banner */
  .ftq-cover__frame{
    position:absolute;
    inset:16px;
    border:1px solid rgba(201,162,74,0.35);
    pointer-events:none;
    z-index:3;
  }

  .ftq-cover__inner{
    position:relative;
    z-index:2;
    width:100%;
    max-width:1080px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:48px;
    padding:64px 56px;
  }

  /* ---- Title block ---- */
  .ftq-titleblock{ flex:1 1 auto; max-width:520px; }

  .ftq-eyebrow{
    font-family:'Montserrat',system-ui,sans-serif;
    font-size:0.72rem;
    font-weight:600;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--ftq-gold-soft);
    margin-bottom:22px;
  }
  .ftq-title{
    font-size:clamp(3rem,7vw,5rem);
    font-weight:600;
    line-height:1.02;
    letter-spacing:0.01em;
    color:var(--ftq-cream);
    text-shadow:0 2px 24px rgba(0,0,0,0.55);
  }
  .ftq-title em{
    font-style:italic;
    font-weight:500;
    color:var(--ftq-gold-soft);
  }
  .ftq-rule{
    display:flex;
    align-items:center;
    gap:14px;
    margin:26px 0 22px;
  }
  .ftq-rule::before,
  .ftq-rule::after{
    content:"";
    height:1px;
    background:linear-gradient(90deg, rgba(201,162,74,0) , rgba(201,162,74,0.9), rgba(201,162,74,0));
    flex:1 1 auto;
    max-width:70px;
  }
  .ftq-rule::after{ max-width:none; }
  .ftq-diamond{
    width:7px; height:7px;
    background:var(--ftq-gold);
    transform:rotate(45deg);
    flex:0 0 auto;
  }
  .ftq-subtitle{
    font-family:'Montserrat',system-ui,sans-serif;
    font-size:0.9rem;
    font-weight:500;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:rgba(246,239,226,0.82);
  }

  /* ---- Box art ---- */
  .ftq-artwrap{
    flex:0 0 auto;
    position:relative;
    perspective:1400px;
  }
  .ftq-art{
    display:block;
    width:clamp(200px,26vw,300px);
    height:auto;
    border-radius:6px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.06) inset,
      0 26px 55px rgba(0,0,0,0.55),
      0 8px 20px rgba(0,0,0,0.4);
    outline:1px solid rgba(201,162,74,0.45);
    outline-offset:6px;
    transform:rotate(2.2deg);
    transition:transform .5s ease, box-shadow .5s ease;
  }
  .ftq-art:hover{
    transform:rotate(0deg) translateY(-4px);
    box-shadow:0 34px 70px rgba(0,0,0,0.6), 0 10px 24px rgba(0,0,0,0.45);
  }
  /* graceful fallback if the image can't load */
  .ftq-art{
    background:linear-gradient(160deg,#3a2a22,#1b1310);
    min-height:220px;
  }

  /* ---- Responsive ---- */
  @media (max-width:760px){
    .ftq-cover{ min-height:0; }
    .ftq-cover__inner{
      flex-direction:column-reverse;
      text-align:center;
      gap:34px;
      padding:56px 28px;
    }
    .ftq-titleblock{ max-width:100%; }
    .ftq-rule{ justify-content:center; }
    .ftq-rule::before{ max-width:50px; }
    .ftq-rule::after{ max-width:50px; flex:0 0 50px; }
    .ftq-art{ transform:rotate(0deg); width:min(62vw,240px); }
    .ftq-cover__frame{ inset:10px; }
  }
</style>
</head>
<body>

  <header class="ftq-cover" role="img" aria-label="For the Queen — A Design Appreciation. Cover featuring the For the Queen storytelling game box art.">
    <div class="ftq-cover__ambient" aria-hidden="true"></div>
    <div class="ftq-cover__scrim" aria-hidden="true"></div>
    <div class="ftq-cover__frame" aria-hidden="true"></div>

    <div class="ftq-cover__inner">
      <div class="ftq-titleblock">
        <p class="ftq-eyebrow">Games Worth Studying</p>
        <h1 class="ftq-title">For the <em>Queen</em></h1>
        <div class="ftq-rule"><span class="ftq-diamond"></span></div>
        <p class="ftq-subtitle">A Design Appreciation</p>
      </div>

      <div class="ftq-artwrap">
        <img
          class="ftq-art"
          src="for-the-queen-box.png"
          alt="For the Queen storytelling game box cover">
      </div>
    </div>
  </header>

</body>
</html>
